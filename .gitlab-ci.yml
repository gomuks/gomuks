stages:
- frontend
- build
- build desktop
- docker

default:
  before_script:
  - mkdir -p .cache
  - export GOPATH="$CI_PROJECT_DIR/.cache"

variables:
  GOTOOLCHAIN: local
  MAU_VERSION_PACKAGE: go.mau.fi/gomuks/version

wasm:
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/golang:1.26-alpine
  stage: frontend
  cache:
    paths:
    - .cache
  before_script:
  - mkdir -p .cache
  - export GOPATH="$CI_PROJECT_DIR/.cache"
  - export GOCACHE="$CI_PROJECT_DIR/.cache/build"
  - apk add --no-cache git
  script:
  - go run ./cmd/rpcdocgen -o rpc.html
  - cd web
  - go run ../pkg/hicli/cmdspec/print src/api/types/stdcommands.json src/api/types/stdcommands.d.ts
  - ./build-wasm.sh
  artifacts:
    paths:
    - web/src/api/wasm/_gomuks.wasm
    - web/src/api/types/stdcommands.json
    - rpc.html
    expire_in: 1 hour

frontend:
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/node:24-alpine
  stage: frontend
  cache:
    paths:
    - web/node_modules
  script:
  - cd web
  - npm ci --include=dev
  - npm run build
  artifacts:
    paths:
    - web/dist
    - rpc.html
    expire_in: 1 hour
  needs:
  - wasm

deploy/wasmuks:
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/golang:1.26-alpine
  stage: frontend
  tags:
  - webdeploy
  script:
  - apk add --no-cache rsync git
  - mkdir -p web/dist/_gomuks/codeblock
  - go run ./cmd/chromagen web/dist/_gomuks/codeblock/
  - |
    if [[ "$CI_COMMIT_BRANCH" == "main" ]]; then
      rsync -rcthvl --delete web/dist/ /srv/web/demo.gomuks.app/
      mv -f rpc.html /srv/web/spec.mau.fi/gomuks/rpc.html
    else
      mkdir -p /srv/web/branch.gomuks.app/$CI_COMMIT_BRANCH/
      rsync -rcthvl --delete web/dist/ /srv/web/branch.gomuks.app/$CI_COMMIT_BRANCH/
    fi
  needs:
  - frontend

.build-linux: &build-linux
  stage: build
  cache:
    paths:
    - .cache
  before_script:
  - mkdir -p .cache
  - export GOPATH="$CI_PROJECT_DIR/.cache"
  - export GOCACHE="$CI_PROJECT_DIR/.cache/build"
  - export MAU_STATIC_BUILD=true
  # go tool is dumb and doesn't realize it needs to always compile for the host OS/arch
  # The maubuild tool will use TARGET_GOOS/GOARCH env vars for the actual build
  - export GOOS=$(go env GOHOSTOS) GOARCH=$(go env GOHOSTARCH)
  script:
  - ./build-noweb.sh
  - ./build-terminal.sh
  artifacts:
    paths:
    - gomuks
    - gomuks-terminal
  needs:
  - frontend

.build-docker: &build-docker
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/docker:latest
  stage: docker
  before_script:
  - docker login -u "$CI_DEPENDENCY_PROXY_USER" -p "$CI_DEPENDENCY_PROXY_PASSWORD" "$CI_DEPENDENCY_PROXY_SERVER"
  - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
  - docker pull $CI_REGISTRY_IMAGE:latest || true
  - |
    docker build \
      --pull --cache-from $CI_REGISTRY_IMAGE:latest \
      --tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA-$DOCKER_ARCH \
      --build-arg DOCKER_HUB=$CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX \
      . --file Dockerfile.ci
  - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA-$DOCKER_ARCH
  after_script:
  - docker rmi $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA-$DOCKER_ARCH

linux/amd64:
  <<: *build-linux
  image: dock.mau.dev/tulir/gomuks-build-docker:linux-amd64
  tags:
  - linux
  - amd64

linux/arm:
  <<: *build-linux
  image: dock.mau.dev/tulir/gomuks-build-docker:linux-arm
  tags:
  - linux
  - amd64

linux/arm64:
  <<: *build-linux
  image: dock.mau.dev/tulir/gomuks-build-docker:linux-arm64-native
  tags:
  - linux
  - arm64

windows/amd64:
  <<: *build-linux
  image: dock.mau.dev/tulir/gomuks-build-docker:windows-amd64
  artifacts:
    paths:
    - gomuks.exe
  tags:
  - linux
  - amd64

macos/arm64:
  stage: build
  tags:
  - macos
  - arm64
  before_script:
  - export PATH=/opt/homebrew/bin:$PATH
  script:
  - CGO_LDFLAGS="-Wl,-headerpad_max_install_names" ./build-noweb.sh
  - ./build-terminal.sh
  - install_name_tool -change $(brew --prefix)/opt/libolm/lib/libolm.3.dylib @rpath/libolm.3.dylib gomuks
  - install_name_tool -add_rpath @executable_path gomuks
  - install_name_tool -add_rpath /opt/homebrew/opt/libolm/lib gomuks
  - install_name_tool -add_rpath /usr/local/opt/libolm/lib gomuks
  - cp $(brew --prefix)/opt/libolm/lib/libolm.3.dylib .
  artifacts:
    paths:
    - gomuks
    - gomuks-terminal
    - libolm.3.dylib
  needs:
  - frontend

docker/amd64:
  <<: *build-docker
  tags:
  - linux
  - amd64
  needs:
  - linux/amd64
  variables:
    DOCKER_ARCH: amd64

docker/arm64:
  <<: *build-docker
  tags:
  - linux
  - arm64
  needs:
  - linux/arm64
  variables:
    DOCKER_ARCH: arm64

docker/manifest:
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/docker:latest
  stage: docker
  variables:
    GIT_STRATEGY: none
  before_script:
  - "mkdir -p $HOME/.docker && echo '{\"experimental\": \"enabled\"}' > $HOME/.docker/config.json"
  - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  needs:
  - docker/amd64
  - docker/arm64
  script:
  - docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA-amd64
  - docker pull $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA-arm64
  - |
    if [[ "$CI_COMMIT_BRANCH" == "main" ]]; then
      export MANIFEST_NAME="$CI_REGISTRY_IMAGE:latest"
    else
      export MANIFEST_NAME="$CI_REGISTRY_IMAGE:${CI_COMMIT_REF_NAME//\//_}"
    fi
    docker manifest create $MANIFEST_NAME $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA-amd64 $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA-arm64
    docker manifest push $MANIFEST_NAME
  - |
    if echo "$CI_COMMIT_TAG" | grep -Eq '^v[0-9]{1}\.[0-9]{4}\.[0-9]+$'; then
      YYMM=$(echo "$CI_COMMIT_TAG" | cut -d. -f2)
      PATCH=$(echo "$CI_COMMIT_TAG" | cut -d. -f3)
      YY=${YYMM%??}
      MM=${YYMM#??}
      if [ "$PATCH" = "0" ]; then
        MANIFEST_NAME="$CI_REGISTRY_IMAGE:v${YY}.${MM}"
      else
        MANIFEST_NAME="$CI_REGISTRY_IMAGE:v${YY}.${MM}.${PATCH}"
      fi
      docker manifest create $MANIFEST_NAME $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA-amd64 $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA-arm64
      docker manifest push $MANIFEST_NAME
      docker manifest rm $MANIFEST_NAME
    fi
  - docker rmi $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA-amd64 $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA-arm64

.build-desktop: &build-desktop
  # Node 24.16+ and 26.1+ are broken https://github.com/electron/electron/issues/51619
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/node:24.15.0-alpine
  stage: build desktop
  cache:
    paths:
    - desktop/node_modules
  script:
  - export GIT_DESCRIBE=$(git describe --tags)
  - echo $GIT_DESCRIBE
  - cd desktop
  - npm ci --include=dev
  - npm run make -- --platform=$PLATFORM --arch=$ARCH
  - tree out/make/
  artifacts:
    paths:
    - desktop/out/make/
    expire_in: 1 day

desktop/linux/amd64:
  <<: *build-desktop
  variables:
    PLATFORM: linux
    ARCH: x64
  before_script:
  - apk add --no-cache fakeroot dpkg git zip
  needs:
  - linux/amd64

desktop/linux/arm64:
  <<: *build-desktop
  variables:
    PLATFORM: linux
    ARCH: arm64
  before_script:
  - apk add --no-cache fakeroot dpkg git zip
  needs:
  - linux/arm64

desktop/windows/amd64:
  <<: *build-desktop
  variables:
    PLATFORM: win32
    ARCH: x64
  before_script:
  - apk add --no-cache wine mono ca-certificates git zip
  - cert-sync /etc/ssl/certs/ca-certificates.crt
  tags:
  - linux
  - amd64 # wine on aarch64 alpine doesn't include wine64, which electron-forge wants
  needs:
  - windows/amd64

desktop/macos/arm64:
  <<: *build-desktop
  cache: {}
  variables:
    PLATFORM: darwin
    ARCH: arm64
  tags:
  - macos
  - arm64
  needs:
  - macos/arm64

deploy/desktop:
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/golang:1.26-alpine
  stage: build desktop
  tags:
  - webdeploy
  script:
  - apk add --no-cache rsync
  - |
    cd desktop/out/make
    mv zip/darwin .
    mv zip/linux .
    mv deb/arm64/* linux/arm64/
    mv deb/x64/* linux/x64/
    mv *.dmg darwin/arm64/
    mv squirrel.windows win32
    rmdir deb/arm64 deb/x64 deb zip
    cd ../../..
  - |
    if [[ "$CI_COMMIT_BRANCH" == "main" ]]; then
      RELEASE_TYPE=nightly
    else
      RELEASE_TYPE=stable
    fi
    mkdir desktop/out/make/latest
    cd desktop/out/make/latest
    ln -sf ../darwin/arm64/*-arm64.dmg gomuks-desktop-macos-arm64.dmg
    ln -sf ../linux/x64/*.deb gomuks-desktop-linux-amd64.deb
    ln -sf ../linux/arm64/*.deb gomuks-desktop-linux-arm64.deb
    ln -sf ../linux/x64/*.zip gomuks-desktop-linux-amd64.zip
    ln -sf ../linux/arm64/*.zip gomuks-desktop-linux-arm64.zip
    ln -sf ../win32/x64/*.exe gomuks-desktop-windows-amd64.exe
    cd ..
    TARGET_DIR=/srv/web/update.gomuks.app/desktop-$RELEASE_TYPE
    rsync -rcthvl . $TARGET_DIR
  only:
    - main
    - tags
  needs:
  - desktop/linux/amd64
  - desktop/linux/arm64
  - desktop/windows/amd64
  - desktop/macos/arm64
